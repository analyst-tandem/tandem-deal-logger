<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tandem Deal Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --border-light: #333;
      --text: #f0ede6;
      --muted: #666;
      --accent: #c8f060;
      --accent-dim: #9bbf3a;
      --danger: #ff5c5c;
      --success: #c8f060;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    .header {
      margin-bottom: 2.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 16px;
      height: 16px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    .tagline {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .drop-zone {
      border: 1.5px dashed var(--border-light);
      border-radius: 8px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: rgba(200, 240, 96, 0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 0.75rem;
      color: var(--muted);
    }

    .drop-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .file-selected {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(200, 240, 96, 0.08);
      border: 1px solid rgba(200, 240, 96, 0.25);
      border-radius: 6px;
      margin-top: 0.75rem;
    }

    .file-selected.show { display: flex; }

    .file-selected-name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remove-file {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }

    .remove-file:hover { color: var(--danger); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }

    .btn-primary:hover:not(:disabled) {
      background: #d8ff6a;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(13,13,13,0.3);
      border-top-color: #0d0d0d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .log {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.75rem;
      margin-top: 1rem;
    }

    .log.show { display: block; }

    .log-header {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .log-body {
      font-family: var(--mono);
      font-size: 12px;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-line {
      padding: 3px 0;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .log-line:last-child { border-bottom: none; }
    .log-line .ts { color: #3a3a3a; min-width: 70px; }
    .log-line.ok .msg { color: var(--success); }
    .log-line.err .msg { color: var(--danger); }
    .log-line.info .msg { color: var(--text); }
    .log-line.warn .msg { color: #f0a030; }

    .summary {
      display: none;
      margin-top: 0.75rem;
      padding: 10px 14px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
    }

    .summary.success {
      display: block;
      background: rgba(200, 240, 96, 0.08);
      border: 1px solid rgba(200, 240, 96, 0.2);
      color: var(--accent);
    }

    .summary.error {
      display: block;
      background: rgba(255, 92, 92, 0.08);
      border: 1px solid rgba(255, 92, 92, 0.2);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8h10M8 3l5 5-5 5" stroke="#0d0d0d" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Tandem Deal Logger</span>
      </div>
      <p class="tagline">Upload a PDF → auto-log to Affinity Active Pipeline</p>
    </div>

    <div class="card">
      <p class="card-title">Deal List PDF</p>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf" />
        <svg class="drop-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="4" width="18" height="24" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M18 4v8h6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M22 26l4 4m0 0l4-4m-4 4V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p class="drop-title">Drop your PDF here</p>
        <p class="drop-sub">or click to browse</p>
      </div>
      <div class="file-selected" id="fileSelected">
        <span class="file-selected-name" id="fileName"></span>
        <button class="remove-file" id="removeFile">×</button>
      </div>
    </div>

    <button class="btn btn-primary" id="submitBtn" disabled>
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Log Deals to Affinity</span>
    </button>

    <div class="log" id="logPanel">
      <div class="log-header">
        <span>Activity Log</span>
        <span id="logCount" style="color: var(--text);"></span>
      </div>
      <div class="log-body" id="logBody"></div>
      <div class="summary" id="summary"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileSelected = document.getElementById('fileSelected');
    const fileName = document.getElementById('fileName');
    const removeFile = document.getElementById('removeFile');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const logPanel = document.getElementById('logPanel');
    const logBody = document.getElementById('logBody');
    const logCount = document.getElementById('logCount');
    const summary = document.getElementById('summary');

    let selectedFile = null;

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f && f.type === 'application/pdf') setFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    removeFile.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileSelected.classList.remove('show');
      submitBtn.disabled = true;
    });

    function setFile(f) {
      selectedFile = f;
      fileName.textContent = f.name;
      fileSelected.classList.add('show');
      submitBtn.disabled = false;
    }

    function addLog(type, msg) {
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8);
      line.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
      logBody.appendChild(line);
      logBody.scrollTop = logBody.scrollHeight;
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      spinner.style.display = 'block';
      btnText.textContent = 'Processing...';
      submitBtn.disabled = true;
      logPanel.classList.add('show');
      logBody.innerHTML = '';
      summary.className = 'summary';
      summary.textContent = '';

      addLog('info', `Reading ${selectedFile.name}...`);

      const formData = new FormData();
      formData.append('pdf', selectedFile);

      try {
        const res = await fetch('/api/log-deals', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          addLog('err', data.error || 'Server error');
          summary.className = 'summary error';
          summary.textContent = '✗ Failed to process deals.';
        } else {
          const { logged, failed, log } = data;
          (log || []).forEach(entry => addLog(entry.type, entry.msg));
          logCount.textContent = `${logged.length} logged`;
          summary.className = 'summary success';
          summary.textContent = `✓ ${logged.length} deal(s) logged: ${logged.join(', ')}${failed.length ? ` | ✗ Failed: ${failed.join(', ')}` : ''}`;
        }
      } catch (err) {
        addLog('err', `Network error: ${err.message}`);
        summary.className = 'summary error';
        summary.textContent = '✗ Could not reach the server.';
      } finally {
        spinner.style.display = 'none';
        btnText.textContent = 'Log Deals to Affinity';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
